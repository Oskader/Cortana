version: '3.8'

services:
  cortana-bot:
    build: .
    env_file:
      - .env
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    environment:
      - RAILWAY_VOLUME=/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  bot_data:
    name: cortana_trading_data
  bot_logs:
    name: cortana_trading_logs
